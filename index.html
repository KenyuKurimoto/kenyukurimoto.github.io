<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="栗本健有 (Ken'yu Kurimoto) のポートフォリオ・職務経歴書。ロボティクス・ROS・AI・システム統合の経験を持つソフトウェアエンジニア。"
    />
    <meta
      name="keywords"
      content="ロボティクス,ROS,ROS2,AI,ソフトウェアエンジニア,栗本健有,Ken'yu Kurimoto"
    />
    <meta name="author" content="栗本健有 (Ken'yu Kurimoto)" />

    <!-- OGP / SNS共有用メタタグ -->
    <meta property="og:title" content="栗本健有 | ソフトウェアエンジニア - ポートフォリオ" />
    <meta
      property="og:description"
      content="ロボティクス・ROS・AI・システム統合の経験を持つソフトウェアエンジニアのポートフォリオ・職務経歴書"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://kenyukurimoto.github.io/" />
    <meta property="og:image" content="https://kenyukurimoto.github.io/assets/avatar.jpg" />
    <meta property="og:locale" content="ja_JP" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="栗本健有 | ソフトウェアエンジニア - ポートフォリオ" />
    <meta
      name="twitter:description"
      content="ロボティクス・ROS・AI・システム統合の経験を持つソフトウェアエンジニアのポートフォリオ・職務経歴書"
    />
    <meta name="twitter:image" content="https://kenyukurimoto.github.io/assets/avatar.jpg" />

    <title>栗本健有 | ソフトウェアエンジニア - ポートフォリオ</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- ============================================================
       HEADER
       ============================================================ -->
    <header class="site-header">
      <div class="container">
        <div class="header-inner">
          <div class="avatar-wrap" id="avatar-wrap">
            <!-- アバター画像がある場合は JS で挿入されます -->
            👤
          </div>
          <div id="header-text">
            <!-- JS で描画 -->
          </div>
        </div>
        <div class="contact-links" id="contact-links">
          <!-- JS で描画 -->
        </div>
      </div>
    </header>

    <!-- ============================================================
       STICKY NAV
       ============================================================ -->
    <nav class="site-nav" aria-label="セクションナビゲーション">
      <div class="container nav-inner">
        <a href="#summary">自己紹介</a>
        <a href="#skills">スキル</a>
        <a href="#experience">職歴</a>
        <a href="#education">学歴</a>
        <a href="#certifications">資格</a>
      </div>
    </nav>

    <!-- ============================================================
       MAIN CONTENT
       ============================================================ -->
    <main class="main-content">
      <div class="container">
        <!-- ── 自己紹介 ─────────────────────────────────────────────── -->
        <section class="section" id="summary">
          <div class="section-header">
            <div class="section-icon blue">👤</div>
            <h2 class="section-title">自己紹介</h2>
            <div class="section-divider"></div>
          </div>
          <div class="summary-card">
            <p id="summary-text">
              <!-- JS で描画 -->
            </p>
          </div>
        </section>

        <!-- ── スキル ────────────────────────────────────────────── -->
        <section class="section" id="skills">
          <div class="section-header">
            <div class="section-icon mint">⚡</div>
            <h2 class="section-title">スキル</h2>
            <div class="section-divider"></div>
          </div>
          <div class="skills-grid" id="skills-grid">
            <!-- JS で描画 -->
          </div>
        </section>

        <!-- ── 職歴 ──────────────────────────────────────────────── -->
        <section class="section" id="experience">
          <div class="section-header">
            <div class="section-icon blue">💼</div>
            <h2 class="section-title">職歴</h2>
            <div class="section-divider"></div>
          </div>
          <div class="experience-list" id="experience-list">
            <!-- JS で描画 -->
          </div>
        </section>

        <!-- ── 学歴 ──────────────────────────────────────────────── -->
        <section class="section" id="education">
          <div class="section-header">
            <div class="section-icon amber">🎓</div>
            <h2 class="section-title">学歴</h2>
            <div class="section-divider"></div>
          </div>
          <div class="education-list" id="education-list">
            <!-- JS で描画 -->
          </div>
        </section>

        <!-- ── 資格 ──────────────────────────────────────────────── -->
        <section class="section" id="certifications">
          <div class="section-header">
            <div class="section-icon amber">🏆</div>
            <h2 class="section-title">所持資格・認定</h2>
            <div class="section-divider"></div>
          </div>
          <div class="cert-list" id="cert-list">
            <!-- JS で描画 -->
          </div>
        </section>
      </div>
      <!-- /.container -->
    </main>

    <!-- ============================================================
       FOOTER
       ============================================================ -->
    <footer class="site-footer">
      <div class="container">
        <p>Last updated: <span id="last-updated"></span></p>
      </div>
    </footer>

    <!-- ============================================================
       SCRIPTS
       ============================================================ -->
    <!-- 1. データファイル（この中に全情報が入っています） -->
    <script src="data/profile.js"></script>
    <!-- 2. メインスクリプト -->
    <script src="js/main.js"></script>
    <script>
      // フッターの更新日時をprofile.jsの値からセット
      document.getElementById("last-updated").textContent = new Date(
        PROFILE.lastUpdated,
      ).toLocaleDateString("ja-JP", {
        year: "numeric",
        month: "long",
        day: "numeric",
      });
    </script>
  </body>
</html>
